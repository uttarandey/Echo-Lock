<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EchoLock</title>
  <meta name="description" content="EchoLock support and privacy policy.">
  <style>
    :root {
      color-scheme: dark;
      --bg: #061013;
      --panel: #0c1b20;
      --text: #e7f8ff;
      --muted: #a8c3cc;
      --line: #245160;
      --accent: #38e8d0;
      --gold: #f6c64d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 20%, rgba(56, 232, 208, 0.18), transparent 34rem),
        linear-gradient(180deg, #071216 0%, var(--bg) 100%);
    }

    main {
      width: min(920px, calc(100% - 32px));
      margin: 0 auto;
      padding: 64px 0;
    }

    .hero {
      display: grid;
      gap: 24px;
      align-items: center;
      min-height: 72vh;
    }

    .mark {
      width: 116px;
      height: 116px;
      display: grid;
      place-items: center;
      border: 2px solid rgba(56, 232, 208, 0.72);
      border-radius: 24px;
      background: linear-gradient(145deg, rgba(56, 232, 208, 0.16), rgba(246, 198, 77, 0.11));
      box-shadow: 0 0 44px rgba(56, 232, 208, 0.18);
    }

    .lock {
      width: 58px;
      height: 46px;
      position: relative;
      border: 6px solid var(--accent);
      border-radius: 16px;
      box-shadow: 0 0 22px rgba(56, 232, 208, 0.46);
    }

    .lock::before {
      content: "";
      position: absolute;
      left: 9px;
      top: -36px;
      width: 28px;
      height: 34px;
      border: 6px solid var(--accent);
      border-bottom: 0;
      border-radius: 24px 24px 0 0;
    }

    .lock::after {
      content: "";
      position: absolute;
      left: 21px;
      top: 14px;
      width: 8px;
      height: 18px;
      border-radius: 8px;
      background: var(--gold);
      box-shadow: 0 -9px 0 3px var(--gold);
    }

    h1 {
      margin: 0;
      font-size: clamp(42px, 9vw, 76px);
      line-height: 0.95;
      letter-spacing: 0;
    }

    p {
      max-width: 680px;
      margin: 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.7;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 8px;
    }

    a {
      color: inherit;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 20px;
      border: 1px solid rgba(56, 232, 208, 0.62);
      border-radius: 8px;
      color: #041113;
      background: var(--accent);
      font-weight: 800;
      text-decoration: none;
    }

    .button.secondary {
      color: var(--text);
      background: rgba(12, 27, 32, 0.88);
    }

    .support {
      display: grid;
      gap: 10px;
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid rgba(36, 81, 96, 0.75);
    }

    .support span {
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <section class="hero" aria-labelledby="title">
      <div class="mark" aria-hidden="true">
        <div class="lock"></div>
      </div>
      <div>
        <h1 id="title">EchoLock</h1>
        <p>
          EchoLock is an offline-first memory puzzle escape game. This site hosts the public privacy policy
          and support contact for the Android app.
        </p>
      </div>
      <nav class="actions" aria-label="EchoLock public links">
        <a class="button" href="privacy-policy.html">Privacy Policy</a>
        <a class="button secondary" href="mailto:uttarandey0107@gmail.com">Contact Support</a>
      </nav>
      <div class="support">
        <strong>Support</strong>
        <span>uttarandey0107@gmail.com</span>
      </div>
    </section>
  </main>
</body>
</html>
